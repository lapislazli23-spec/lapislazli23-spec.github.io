<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kindle Dashboard</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden; /* スクロール禁止 */
  background: #fff;
  color: #000;
  font-family: sans-serif;
}

/* 全体を1画面に収める */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 8px;
  box-sizing: border-box;
}

/* ヘッダー */
.header {
  font-size: 18px;
  text-align: center;
  margin-bottom: 5px;
}

/* メインを上下分割 */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* セクション */
.section {
  flex: 1;
}

/* タイトル */
.title {
  font-size: 16px;
  border-bottom: 1px solid #000;
  margin-bottom: 4px;
}

/* アイテム */
.item {
  font-size: 14px;
  line-height: 1.2;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* フッター */
.footer {
  font-size: 11px;
  text-align: right;
}
</style>
</head>

<body>
<div class="container">

  <div class="header" id="date"></div>

  <div class="main">

    <div class="section">
      <div class="title">予定</div>
      <div id="calendar"></div>
    </div>

    <div class="section">
      <div class="title">TODO</div>
      <div id="todo"></div>
    </div>

  </div>

  <div class="footer" id="refresh"></div>

</div>

<script>

const API_BASE = "https://weathered-art-a4cf.lapislazli23.workers.dev";

// ===== 日付 =====
function updateDate() {
  const now = new Date();
  document.getElementById("date").textContent =
    now.toLocaleDateString("ja-JP", {
      month: "2-digit",
      day: "2-digit",
      weekday: "short"
    });
}

// ===== カレンダー（最大4件）=====
async function loadCalendar() {
  const res = await fetch(API_BASE + "/calendar");
  const data = await res.json();

  const el = document.getElementById("calendar");
  el.innerHTML = "";

  data.slice(0, 4).forEach(e => {
    const div = document.createElement("div");
    div.className = "item";

    const date = e.start.substring(5, 10);
    div.textContent = `${date} ${e.title}`;

    el.appendChild(div);
  });
}

// ===== Todo（最大4件）=====
async function loadTodo() {
  const res = await fetch(API_BASE + "/todo");
  const data = await res.json();

  const el = document.getElementById("todo");
  el.innerHTML = "";

  data.slice(0, 4).forEach(t => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = "・" + t.content;
    el.appendChild(div);
  });
}

// ===== 更新時間 =====
function updateRefresh() {
  const now = new Date();
  document.getElementById("refresh").textContent =
    now.toLocaleTimeString();
}

// ===== 初期化 =====
async function init() {
  updateDate();
  await loadCalendar();
  await loadTodo();
  updateRefresh();
}

// ===== Kindle向け低頻度更新 =====
setInterval(init, 15 * 60 * 1000);

init();

</script>

</body>
</html>
