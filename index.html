<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kindle Dashboard</title>

<style>
body {
  font-family: sans-serif;
  background: #fff;
  color: #000;
  margin: 0;
  padding: 10px;
}

/* Kindle最適 */
.container {
  max-width: 600px;
  margin: auto;
}

h1 {
  font-size: 22px;
  border-bottom: 2px solid #000;
  margin-bottom: 10px;
}

.section {
  margin-bottom: 20px;
}

.item {
  margin-bottom: 8px;
  font-size: 16px;
}

/* 日付 */
.date {
  font-size: 18px;
  margin-bottom: 10px;
}

/* 自動更新表示 */
.refresh {
  font-size: 12px;
  color: #666;
}
</style>
</head>

<body>
<div class="container">

  <div class="date" id="date"></div>

  <div class="section">
    <h1>予定</h1>
    <div id="calendar"></div>
  </div>

  <div class="section">
    <h1>TODO</h1>
    <div id="todo"></div>
  </div>

  <div class="refresh" id="refresh"></div>

</div>

<script>

// ===== 設定（ここだけ変更） =====
const API_BASE = "https://weathered-art-a4cf.lapislazli23.workers.dev";

// ===== 日付表示 =====
function updateDate() {
  const now = new Date();
  document.getElementById("date").textContent =
    now.toLocaleDateString("ja-JP", {
      weekday: "short",
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    });
}

// ===== カレンダー取得 =====
async function loadCalendar() {
  const res = await fetch(API_BASE + "/calendar");
  const data = await res.json();

  const el = document.getElementById("calendar");
  el.innerHTML = "";

  data.forEach(e => {
    const div = document.createElement("div");
    div.className = "item";

    const date = e.start.substring(0, 10);
    div.textContent = `${date} ${e.title}`;

    el.appendChild(div);
  });
}

// ===== Todo取得 =====
async function loadTodo() {
  const res = await fetch(API_BASE + "/todo");
  const data = await res.json();

  const el = document.getElementById("todo");
  el.innerHTML = "";

  data.forEach(t => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = "・" + t.content;
    el.appendChild(div);
  });
}

// ===== 更新表示 =====
function updateRefresh() {
  const now = new Date();
  document.getElementById("refresh").textContent =
    "更新: " + now.toLocaleTimeString();
}

// ===== 初期実行 =====
async function init() {
  updateDate();
  await loadCalendar();
  await loadTodo();
  updateRefresh();
}

// ===== 自動更新（Kindle向け軽量） =====
// 10分ごと
setInterval(init, 10 * 60 * 1000);

init();

</script>

</body>
</html>
