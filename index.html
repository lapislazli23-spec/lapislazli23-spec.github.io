<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kindle Dashboard</title>

<style>
body {
  background: #ffffff;
  color: #000000;
  font-family: sans-serif;
  margin: 20px;
  font-size: 24px;
  line-height: 1.6;
}

/* タイトル */
h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

h2 {
  font-size: 26px;
  margin-bottom: 10px;
}

/* セクション間の余白 */
.section {
  margin-bottom: 40px;
}

/* iframe調整（重要） */
iframe {
  width: 100%;
  height: 500px;
  border: none;
}

/* 不要要素の抑制 */
* {
  animation: none !important;
  transition: none !important;
}

/* コントラスト強化 */
strong {
  font-weight: bold;
}

/* リンクも黒に */
a {
  color: #000000;
  text-decoration: none;
}
</style>

</head>

<body>

<h1>Dashboard</h1>

<div class="section">
  <h2>Calendar</h2>
  <iframe src="https://calendar.google.com/calendar/embed?src=lapislazli23%40gmail.com&mode=AGENDA&bgcolor=%23ffffff&color=%23000000"></iframe>
</div>

<div class="section">
  <h2>Todo</h2>
  <iframe src="https://todoist.com/app"></iframe>
</div>

</body>
</html>
